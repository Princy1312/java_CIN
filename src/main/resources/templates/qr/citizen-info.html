<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informations Citoyen - CIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .info-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 800px;
            margin: 0 auto;
        }
        .header-section {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .photo-section {
            text-align: center;
            padding: 2rem;
            background: #f8f9fa;
        }
        .citizen-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .info-section {
            padding: 2rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .info-item {
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .info-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.1rem;
            color: #333;
            margin: 0;
        }
        .verification-badge {
            background: #28a745;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .btn-back {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            color: white;
        }
        .cin-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-container">
            <div class="header-section">
                <div class="verification-badge">
                    <i class="fas fa-check-circle me-2"></i>
                    VÉRIFIÉ
                </div>
                <h2><i class="fas fa-id-card me-2"></i>Carte d'Identité Nationale</h2>
                <div class="cin-number" th:text="'N° ' + ${citizen.numeroNational}">N° CIN</div>
            </div>
            
            <div class="photo-section">
                <img th:src="${citizen.photoPath != null ? '/uploads/photos/' + citizen.photoPath : 'https://picsum.photos/seed/citizen/150/150'}" 
                     alt="Photo du citoyen" class="citizen-photo">
                <h3 class="mt-3" th:text="${citizen.prenom + ' ' + citizen.nom}">Nom Complet</h3>
            </div>
            
            <div class="info-section">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-calendar me-2"></i>Date de Naissance
                        </div>
                        <p class="info-value" th:text="${#temporals.format(citizen.dateNaissance, 'dd MMMM yyyy')}">Date</p>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-map-marker-alt me-2"></i>Lieu de Naissance
                        </div>
                        <p class="info-value" th:text="${citizen.lieuNaissance}">Lieu</p>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-venus-mars me-2"></i>Sexe
                        </div>
                        <p class="info-value" th:text="${citizen.sexe}">Sexe</p>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-home me-2"></i>Adresse
                        </div>
                        <p class="info-value" th:text="${citizen.adresse}">Adresse</p>
                    </div>
                    
                    <div class="info-item" th:if="${citizen.region != null and !citizen.region.empty}">
                        <div class="info-label">
                            <i class="fas fa-globe me-2"></i>Région
                        </div>
                        <p class="info-value" th:text="${citizen.region}">Région</p>
                    </div>
                    
                    <div class="info-item" th:if="${citizen.profession != null and !citizen.profession.empty}">
                        <div class="info-label">
                            <i class="fas fa-briefcase me-2"></i>Profession
                        </div>
                        <p class="info-value" th:text="${citizen.profession}">Profession</p>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-clock me-2"></i>Date d'Enregistrement
                        </div>
                        <p class="info-value" th:text="${#temporals.format(citizen.dateEnregistrement, 'dd MMMM yyyy HH:mm')}">Date</p>
                    </div>
                    
                    <div class="info-item" th:if="${citizen.agentEnregistrement != null}">
                        <div class="info-label">
                            <i class="fas fa-user-shield me-2"></i>Agent d'Enregistrement
                        </div>
                        <p class="info-value" th:text="${citizen.agentEnregistrement.username}">Agent</p>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="/qr/scan" class="btn-back">
                        <i class="fas fa-arrow-left me-2"></i>
                        Scanner un autre QR Code
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
