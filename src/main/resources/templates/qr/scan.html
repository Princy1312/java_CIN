<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR Code CIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .qr-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 2rem;
        }
        .btn-scan {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn-scan:hover {
            transform: translateY(-2px);
            color: white;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 0.75rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>
<body>
    <div class="scan-container">
        <div class="qr-icon">
            <i class="fas fa-qrcode"></i>
        </div>
        
        <h2 class="mb-4">Scanner QR Code CIN</h2>
        <p class="text-muted mb-4">Scannez le QR code de la carte d'identité nationale pour vérifier les informations du citoyen</p>
        
        <form th:action="@{/qr/verify}" method="post">
            <div class="mb-4">
                <label for="token" class="form-label">Code QR (token)</label>
                <input type="text" class="form-control" id="token" name="token" 
                       placeholder="Entrez le token du QR code" required>
                <small class="text-muted">Vous pouvez également scanner directement avec votre application mobile</small>
            </div>
            
            <button type="submit" class="btn btn-scan w-100">
                <i class="fas fa-search me-2"></i>
                Vérifier le QR Code
            </button>
        </form>
        
        <div class="mt-4">
            <a href="/" class="text-muted">
                <i class="fas fa-arrow-left me-1"></i>
                Retour à l'accueil
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
