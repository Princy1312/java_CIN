<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: layout(content=~{::content},scripts=~{::scripts},activePage='users',pageTitle='Utilisateur')}">
<div th:fragment="content">
<div class="row justify-content-center"><div class="col-lg-7">
<div class="d-flex align-items-center gap-3 mb-4"><a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Retour</a><h5 class="mb-0" th:text="${user.id!=null}?'Modifier':'Créer Utilisateur'"></h5></div>
<div class="card"><div class="card-header"><i class="bi bi-person-gear me-2 text-primary"></i>Informations</div>
<div class="card-body">
<form th:action="${user.id!=null}?@{/admin/users/{id}/edit(id=${user.id})}:@{/admin/users/new}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label><input type="text" name="nom" class="form-control" th:value="${user.nom}" required></div>
        <div class="col-md-6"><label class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label><input type="text" name="prenom" class="form-control" th:value="${user.prenom}" required></div>
        <div class="col-md-8"><label class="form-label fw-semibold">Email <span class="text-danger">*</span></label><input type="email" name="email" class="form-control" th:value="${user.email}" th:readonly="${user.id!=null}" required></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Rôle <span class="text-danger">*</span></label>
            <select name="role" class="form-select" required><option th:each="r:${roles}" th:value="${r}" th:text="${r.name().replace('_',' ')}" th:selected="${user.role==r}"></option></select>
        </div>
        <div class="col-md-6"><label class="form-label fw-semibold">Mot de Passe <span th:text="${user.id!=null}?'':'*'"></span></label><input type="password" name="motDePasse" class="form-control" placeholder="Min 8 caractères" th:required="${user.id==null}"></div>
        <div class="col-md-3 d-flex align-items-end"><div class="form-check mb-2"><input type="checkbox" name="actif" id="actif" class="form-check-input" th:checked="${user.id==null or user.actif}" value="true"><label for="actif" class="form-check-label">Compte actif</label></div></div>
    </div>
    <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-circle me-2"></i><span th:text="${user.id!=null}?'Mettre à jour':'Créer'"></span></button>
        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Annuler</a>
    </div>
</form>
</div></div>
</div></div>
</div>
<div th:fragment="scripts"></div>
</div></body></html>
