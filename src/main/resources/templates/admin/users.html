<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: layout(content=~{::content},scripts=~{::scripts},activePage='users',pageTitle='Gestion des Utilisateurs')}">
<div th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <p class="text-muted mb-0">Administration des comptes</p>
    <a th:href="@{/admin/users/new}" class="btn btn-primary"><i class="bi bi-person-plus me-2"></i>Nouvel Utilisateur</a>
</div>
<div class="card">
    <div class="card-header d-flex justify-content-between"><span><i class="bi bi-people me-2 text-primary"></i>Utilisateurs</span><span class="badge bg-primary" th:text="${#lists.size(users)}+' comptes'"></span></div>
    <div class="card-body p-0"><div class="table-responsive"><table class="table table-hover mb-0">
        <thead><tr><th>Utilisateur</th><th>Email</th><th>Rôle</th><th>Statut</th><th>Créé le</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="u:${users}">
            <td><div class="d-flex align-items-center gap-2">
                <div style="width:35px;height:35px;border-radius:50%;background:#1a3c5e;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px" th:text="${u.prenom.substring(0,1)}+${u.nom.substring(0,1)}"></div>
                <span class="fw-semibold" th:text="${u.prenom}+' '+${u.nom}"></span>
            </div></td>
            <td th:text="${u.email}"></td>
            <td><span class="badge bg-secondary" th:text="${u.role.name().replace('_',' ')}"></span></td>
            <td><span class="badge" th:classappend="${u.actif}?'bg-success':'bg-danger'" th:text="${u.actif}?'Actif':'Inactif'"></span></td>
            <td th:text="${#temporals.format(u.dateCreation,'dd/MM/yyyy')}"></td>
            <td><div class="d-flex gap-1">
                <a th:href="@{/admin/users/{id}/edit(id=${u.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm" th:classappend="${u.actif}?'btn-outline-danger':'btn-outline-success'"><i class="bi" th:classappend="${u.actif}?'bi-person-x':'bi-person-check'"></i></button>
                </form>
                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Supprimer?')"><i class="bi bi-trash"></i></button>
                </form>
            </div></td>
        </tr>
        </tbody>
    </table></div></div>
</div>
</div>
<div th:fragment="scripts"></div>
</div></body></html>
