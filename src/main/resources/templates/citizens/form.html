<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: layout(content=~{::content},scripts=~{::scripts},activePage='citizens',pageTitle='Enregistrement Citoyen')}">
<div th:fragment="content">
<div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/citizens}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Retour</a>
    <h5 class="mb-0" th:text="${citizen.id!=null}?'Modifier Citoyen':'Nouveau Citoyen'"></h5>
</div>
<form th:action="${citizen.id!=null}?@{/citizens/{id}/edit(id=${citizen.id})}:@{/citizens/new}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="card mb-4"><div class="card-header"><i class="bi bi-person-fill me-2 text-primary"></i>Informations Personnelles</div>
    <div class="card-body"><div class="row g-3">
        <div class="col-md-4"><label class="form-label fw-semibold">N° National <span class="text-danger">*</span></label><input type="text" name="numeroNational" class="form-control" th:value="${citizen.numeroNational}" th:readonly="${citizen.id!=null}" placeholder="Ex: MG-2000-001234" required></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label><input type="text" name="nom" class="form-control" th:value="${citizen.nom}" required></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label><input type="text" name="prenom" class="form-control" th:value="${citizen.prenom}" required></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Date de Naissance <span class="text-danger">*</span></label><input type="date" name="dateNaissance" class="form-control" th:value="${citizen.dateNaissance}" required></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Lieu de Naissance <span class="text-danger">*</span></label><input type="text" name="lieuNaissance" class="form-control" th:value="${citizen.lieuNaissance}" required></div>
        <div class="col-md-4"><label class="form-label fw-semibold">Sexe <span class="text-danger">*</span></label>
            <select name="sexe" class="form-select" required><option value="">-- Sélectionner --</option><option value="M" th:selected="${citizen.sexe=='M'}">Masculin</option><option value="F" th:selected="${citizen.sexe=='F'}">Féminin</option></select>
        </div>
    </div></div></div>
    <div class="card mb-4"><div class="card-header"><i class="bi bi-geo-alt-fill me-2 text-primary"></i>Adresse</div>
    <div class="card-body"><div class="row g-3">
        <div class="col-md-6"><label class="form-label fw-semibold">Adresse <span class="text-danger">*</span></label><input type="text" name="adresse" class="form-control" th:value="${citizen.adresse}" required></div>
        <div class="col-md-3"><label class="form-label fw-semibold">Région</label>
            <select name="region" class="form-select">
                <option value="">-- Sélectionner --</option>
                <option th:each="r:${ {'Analamanga','Vakinankaratra','Itasy','Bongolava','Haute Matsiatra','Atsinanana','Analanjirofo','Alaotra-Mangoro','Boeny','Sofia','Betsiboka','Melaky','Atsimo-Andrefana','Androy','Anosy','Menabe','Diana','Sava'} }" th:value="${r}" th:text="${r}" th:selected="${citizen.region==r}"></option>
            </select>
        </div>
        <div class="col-md-3"><label class="form-label fw-semibold">Profession</label><input type="text" name="profession" class="form-control" th:value="${citizen.profession}"></div>
    </div></div></div>
    <div class="card mb-4"><div class="card-header"><i class="bi bi-camera-fill me-2 text-primary"></i>Photo</div>
    <div class="card-body">
        <input type="file" name="photo" class="form-control" accept="image/*" id="photoInput">
        <small class="text-muted">JPG, PNG — max 5MB</small>
        <div id="photoPreview" class="mt-3" style="display:none"><img id="previewImg" style="max-width:150px;max-height:180px;border:2px solid #dee2e6;border-radius:8px" alt="Aperçu"></div>
    </div></div>
    <div class="d-flex gap-3">
        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-circle me-2"></i><span th:text="${citizen.id!=null}?'Mettre à jour':'Enregistrer'"></span></button>
        <a th:href="@{/citizens}" class="btn btn-outline-secondary">Annuler</a>
    </div>
</form>
</div>
<div th:fragment="scripts">
<script>document.getElementById('photoInput').addEventListener('change',function(e){const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('previewImg').src=ev.target.result;document.getElementById('photoPreview').style.display='block'};r.readAsDataURL(f)}});</script>
</div>
</div></body></html>
