<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: layout(content=~{::content},scripts=~{::scripts},activePage='citizens',pageTitle='Gestion des Citoyens')}">
<div th:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <p class="text-muted mb-0">Liste des citoyens enregistrés</p>
    <a sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')"
       th:href="@{/citizens/new}" class="btn btn-primary">
        <i class="bi bi-person-plus me-2"></i>Nouveau Citoyen
    </a>
</div>

<div class="card mb-4"><div class="card-body">
    <form method="get" th:action="@{/citizens}" class="d-flex gap-3">
        <div class="input-group"><span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" name="search" class="form-control" placeholder="Rechercher par nom, prénom ou N° national..." th:value="${search}"></div>
        <button type="submit" class="btn btn-primary px-4">Rechercher</button>
        <a th:href="@{/citizens}" class="btn btn-outline-secondary">Réinitialiser</a>
    </form>
</div></div>

<div class="card">
    <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-people me-2 text-primary"></i>Citoyens</span>
        <span class="badge bg-primary" th:text="${#lists.size(citizens)}+' enregistrés'"></span>
    </div>
    <div class="card-body p-0"><div class="table-responsive"><table class="table table-hover mb-0">
        <thead><tr><th>Citoyen</th><th>N° National</th><th>Date Naiss.</th><th>Lieu Naiss.</th><th>Région</th><th>Profession</th><th>Enregistré le</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="c:${citizens}">
            <td><div class="d-flex align-items-center gap-2">
                <div style="width:35px;height:35px;border-radius:50%;background:#e3eaf2;display:flex;align-items:center;justify-content:center"><span th:text="${c.sexe=='M'}?'👨':'👩'"></span></div>
                <div><div class="fw-semibold" th:text="${c.nom}+' '+${c.prenom}"></div><small class="text-muted" th:text="${c.sexe=='M'}?'Masculin':'Féminin'"></small></div>
            </div></td>
            <td><code th:text="${c.numeroNational}"></code></td>
            <td th:text="${c.dateNaissance}"></td>
            <td th:text="${c.lieuNaissance}"></td>
            <td th:text="${c.region}?:'-'"></td>
            <td th:text="${c.profession}?:'-'"></td>
            <td><small th:text="${#temporals.format(c.dateEnregistrement,'dd/MM/yyyy')}"></small></td>
            <td><div class="d-flex gap-1">
                <!-- VOIR : tous -->
                <a th:href="@{/citizens/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary" title="Voir"><i class="bi bi-eye"></i></a>
                <!-- MODIFIER : Agent Enregistrement + Admin -->
                <a sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')"
                   th:href="@{/citizens/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-warning" title="Modifier"><i class="bi bi-pencil"></i></a>
                <!-- ARCHIVER : Agent Enregistrement + Admin -->
                <form sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')"
                      th:action="@{/citizens/{id}/archive(id=${c.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-secondary" title="Archiver" onclick="return confirm('Archiver ce citoyen?')"><i class="bi bi-archive"></i></button>
                </form>
                <!-- SUPPRIMER : Admin seulement -->
                <form sec:authorize="hasRole('ADMINISTRATEUR')"
                      th:action="@{/citizens/{id}/delete(id=${c.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer" onclick="return confirm('Supprimer définitivement?')"><i class="bi bi-trash"></i></button>
                </form>
            </div></td>
        </tr>
        <tr th:if="${#lists.isEmpty(citizens)}">
            <td colspan="8" class="text-center text-muted py-5">
                <div style="font-size:50px">👥</div><p>Aucun citoyen</p>
                <a sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')" th:href="@{/citizens/new}" class="btn btn-primary btn-sm">Premier enregistrement</a>
            </td>
        </tr>
        </tbody>
    </table></div></div>
</div>
</div>
<div th:fragment="scripts"></div>
</div></body></html>
