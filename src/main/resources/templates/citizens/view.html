<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: layout(content=~{::content},scripts=~{::scripts},activePage='citizens',pageTitle='Fiche Citoyen')}">
<div th:fragment="content">

<div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/citizens}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Retour</a>
    <a sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')"
       th:href="@{/citizens/{id}/edit(id=${citizen.id})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil me-1"></i>Modifier</a>
    <form sec:authorize="hasRole('ADMINISTRATEUR')"
          th:action="@{/citizens/{id}/delete(id=${citizen.id})}" method="post" class="d-inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Supprimer définitivement?')"><i class="bi bi-trash me-1"></i>Supprimer</button>
    </form>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card text-center"><div class="card-body py-4">
            <div style="width:100px;height:120px;background:#e3eaf2;border-radius:8px;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:60px;border:3px solid #1a3c5e"><span th:text="${citizen.sexe=='M'}?'👨':'👩'"></span></div>
            <h5 class="fw-bold" th:text="${citizen.nom}+' '+${citizen.prenom}"></h5>
            <p class="text-muted mb-1"><code th:text="${citizen.numeroNational}"></code></p>
            <span class="badge bg-primary" th:text="${citizen.sexe=='M'}?'Masculin':'Féminin'"></span>
        </div></div>
        <div class="card mt-3" th:if="${qrCodeBase64!=null}">
            <div class="card-header text-center"><i class="bi bi-qr-code me-2 text-primary"></i>QR Code CIN</div>
            <div class="card-body text-center">
                <img th:src="'data:image/png;base64,'+${qrCodeBase64}" style="width:180px;height:180px" alt="QR Code">
                <p class="text-muted mt-2 mb-0" style="font-size:11px">Scan pour vérification</p>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card mb-4"><div class="card-header"><i class="bi bi-person-vcard me-2 text-primary"></i>Informations Personnelles</div>
        <div class="card-body"><div class="row g-3">
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">NOM COMPLET</label><p class="fw-semibold mb-0" th:text="${citizen.nom}+' '+${citizen.prenom}"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">DATE DE NAISSANCE</label><p class="fw-semibold mb-0" th:text="${citizen.dateNaissance}"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">LIEU DE NAISSANCE</label><p class="fw-semibold mb-0" th:text="${citizen.lieuNaissance}"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">SEXE</label><p class="fw-semibold mb-0" th:text="${citizen.sexe=='M'}?'Masculin':'Féminin'"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">ADRESSE</label><p class="fw-semibold mb-0" th:text="${citizen.adresse}"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">RÉGION</label><p class="fw-semibold mb-0" th:text="${citizen.region}?:'Non renseignée'"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">PROFESSION</label><p class="fw-semibold mb-0" th:text="${citizen.profession}?:'Non renseignée'"></p></div>
            <div class="col-md-6"><label class="text-muted" style="font-size:12px">ENREGISTRÉ LE</label><p class="fw-semibold mb-0" th:text="${#temporals.format(citizen.dateEnregistrement,'dd/MM/yyyy HH:mm')}"></p></div>
        </div></div></div>
        <div class="card"><div class="card-header"><i class="bi bi-lightning me-2 text-warning"></i>Actions</div>
        <div class="card-body d-flex gap-3 flex-wrap">
            <a sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')"
               th:href="@{/requests/new}" class="btn btn-success"><i class="bi bi-file-earmark-plus me-2"></i>Créer une Demande CIN</a>
            <a th:href="@{/requests}" class="btn btn-primary"><i class="bi bi-file-earmark-text me-2"></i>Voir les Demandes</a>
            <form sec:authorize="hasAnyRole('AGENT_ENREGISTREMENT','ADMINISTRATEUR')"
                  th:action="@{/citizens/{id}/archive(id=${citizen.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-secondary" onclick="return confirm('Archiver?')"><i class="bi bi-archive me-2"></i>Archiver</button>
            </form>
        </div></div>
    </div>
</div>
</div>
<div th:fragment="scripts"></div>
</div></body></html>
